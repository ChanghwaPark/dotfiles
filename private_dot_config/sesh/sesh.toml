#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json

cache = true

# Default behavior for any session: open nvim (left 70%) + claude (right 30%), preview with bat
[default_session]
startup_command = "tmux split-window -h -l 30% -d claude; nvim"
preview_command = "bat --color=always --style=plain {}"
