[mgr]
ratio          = [1, 3, 4]
sort_by        = "natural"
sort_sensitive = false
sort_dir_first = true
show_hidden    = true
show_symlink   = true
scrolloff      = 5
linemode       = "size"

[preview]
wrap          = "no"
tab_size      = 2
max_width     = 600
max_height    = 900
image_filter  = "triangle"
image_quality = 75

[opener]
edit = [
  { run = '${EDITOR:-nvim} "$@"', block = true, for = "unix" },
]

[plugin]
prepend_fetchers = [
  { url = "*",          run = "git",            group = "git" },
  { url = "*/",         run = "git",            group = "git" },
  { url = "local://*",  run = "mime-ext.local",  prio = "high", group = "mime" },
  { url = "remote://*", run = "mime-ext.remote", prio = "high", group = "mime" },
]

prepend_previewers = [
  { url = "*.md", run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"' },
]
