# === Manager ===

[[mgr.prepend_keymap]]
on   = "<Enter>"
run  = "plugin smart-enter"
desc = "Smart open/enter"

[[mgr.prepend_keymap]]
on   = "F"
run  = "plugin smart-filter"
desc = "Smart filter"

[[mgr.prepend_keymap]]
on   = "p"
run  = "plugin smart-paste"
desc = "Smart paste"

[[mgr.prepend_keymap]]
on   = "f"
run  = "plugin jump-to-char"
desc = "Jump to char"

[[mgr.prepend_keymap]]
on   = ["c", "m"]
run  = "plugin chmod"
desc = "Chmod selected files"

[[mgr.prepend_keymap]]
on   = ["c", "d"]
run  = "plugin diff"
desc = "Diff files"

[[mgr.prepend_keymap]]
on   = "T"
run  = "plugin toggle-pane max-preview"
desc = "Maximize/restore preview"

[[mgr.prepend_keymap]]
on   = "m"
run  = "plugin bookmarks save"
desc = "Save bookmark"

[[mgr.prepend_keymap]]
on   = "'"
run  = "plugin bookmarks jump"
desc = "Jump to bookmark"

# Shell & Git
[[mgr.prepend_keymap]]
on   = "!"
run  = 'shell "$SHELL" --block'
desc = "Open shell here"

[[mgr.prepend_keymap]]
on   = ["g", "i"]
run  = 'shell "lazygit" --block'
desc = "Open lazygit"

# Goto shortcuts
[[mgr.prepend_keymap]]
on   = ["g", "h"]
run  = "cd ~"
desc = "Go home"

[[mgr.prepend_keymap]]
on   = ["g", "c"]
run  = "cd ~/.config"
desc = "Go to config"

[[mgr.prepend_keymap]]
on   = ["g", "d"]
run  = "cd ~/Downloads"
desc = "Go to downloads"

[[mgr.prepend_keymap]]
on   = ["g", "D"]
run  = "cd ~/Desktop"
desc = "Go to desktop"

[[mgr.prepend_keymap]]
on   = ["g", "r"]
run  = 'shell -- ya emit cd "$(git rev-parse --show-toplevel)"'
desc = "Go to git root"

# === Input ===
[[input.prepend_keymap]]
on   = "<Esc>"
run  = "close"
desc = "Close input"
